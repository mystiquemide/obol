name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      # Placeholder values — Prisma needs the vars present at generate/build time.
      # No real database is contacted during lint, type-check, test, or build.
      DATABASE_URL: postgresql://user:pass@localhost:5432/obol
      DIRECT_URL: postgresql://user:pass@localhost:5432/obol

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # The npm bundled with Node 20 can crash with "Exit handler never called"
      # during install. Pin a known-good newer npm.
      - name: Update npm
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
